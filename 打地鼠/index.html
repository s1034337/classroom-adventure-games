<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打地鼠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #fff1cf;
      --paper-deep: #f6d79a;
      --ink: #5b341f;
      --red: #e84855;
      --tea: #7fb069;
      --mint: #89c997;
      --wood: #9a6037;
      --wood-dark: #5a321e;
      --gold: #f6b94f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Kosugi Maru", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 82% 13%, rgba(212, 76, 54, 0.28) 0 60px, transparent 62px),
        radial-gradient(circle at 14% 17%, rgba(255, 255, 255, 0.65) 0 34px, transparent 36px),
        radial-gradient(circle at 22% 14%, rgba(255, 255, 255, 0.48) 0 22px, transparent 24px),
        radial-gradient(circle at 8% 88%, rgba(216, 116, 86, 0.18) 0 86px, transparent 88px),
        radial-gradient(circle at 92% 80%, rgba(127, 176, 105, 0.2) 0 96px, transparent 98px),
        linear-gradient(180deg, #fff7df 0%, #fff0c7 45%, #f0cb83 100%);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 18px 18px, rgba(156, 93, 53, 0.06) 0 2px, transparent 3px),
        linear-gradient(90deg, rgba(123, 75, 42, 0.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(123, 75, 42, 0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(180deg, transparent, #000 12%, #000 88%, transparent);
    }

    body::after {
      content: "✿  ✦  ✿  ✦  ✿";
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(92vw, 760px);
      color: rgba(190, 84, 80, 0.5);
      font-size: clamp(1.2rem, 3vw, 2rem);
      letter-spacing: 18px;
      pointer-events: none;
      text-align: center;
    }

    body.screen-shake {
      animation: screenShake 240ms ease;
    }

    main {
      position: relative;
      width: min(94vw, 780px);
      padding: 20px;
      text-align: center;
    }

    h1 {
      position: relative;
      width: fit-content;
      margin: 0 auto 16px;
      padding: 12px 34px 15px;
      border: 4px solid #704322;
      border-radius: 8px;
      font-size: clamp(2rem, 6vw, 4.2rem);
      line-height: 1;
      color: #fff4cf;
      background:
        repeating-linear-gradient(90deg, rgba(255, 228, 166, 0.18) 0 8px, transparent 9px 24px),
        linear-gradient(180deg, #a66a3a, #704322);
      box-shadow: 0 8px 0 rgba(91, 50, 24, 0.28), inset 0 2px 0 rgba(255, 246, 209, 0.28);
      text-shadow: 0 3px 0 #5d3119;
      rotate: -1.5deg;
    }

    h1::before,
    h1::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 12px;
      height: 64%;
      border-radius: 999px;
      background: #5f351e;
      transform: translateY(-50%);
      box-shadow: inset 0 2px 0 rgba(255, 231, 170, 0.2);
    }

    h1::before {
      left: 10px;
    }

    h1::after {
      right: 10px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 0 auto 18px;
      max-width: 670px;
    }

    .panel {
      min-height: 76px;
      padding: 10px 8px;
      border: 3px solid rgba(118, 70, 35, 0.38);
      border-radius: 8px;
      background:
        radial-gradient(circle at 16px 14px, rgba(188, 83, 79, 0.13) 0 7px, transparent 8px),
        linear-gradient(135deg, rgba(255, 255, 255, 0.34), transparent 44%),
        #ffe6aa;
      box-shadow: 0 6px 0 rgba(112, 66, 33, 0.23);
      display: grid;
      align-content: center;
      gap: 3px;
    }

    .label {
      font-size: 0.86rem;
      font-weight: 900;
      color: #86552f;
    }

    .value {
      font-size: clamp(1.25rem, 4vw, 2rem);
      font-weight: 900;
      color: #28746b;
      transition: color 160ms ease, transform 160ms ease;
    }

    .value.danger {
      color: var(--red);
      animation: redPulse 380ms ease-in-out infinite alternate;
    }

    .start-button,
    .restart-button {
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #ffd36b, #ee923e);
      color: #5a2f1b;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 #a65327;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .start-button {
      width: 100%;
      height: 46px;
      align-self: center;
    }

    .start-button:disabled {
      cursor: default;
      filter: saturate(0.85);
    }

    .start-button:active,
    .restart-button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #a65327;
    }

    .combo {
      min-height: 42px;
      margin: -5px 0 8px;
      font-size: clamp(1.4rem, 5vw, 2.5rem);
      font-weight: 900;
      color: #f25f5c;
      text-shadow: 0 3px 0 #fff8de, 0 6px 0 rgba(95, 52, 25, 0.15);
      opacity: 0;
      transform: translateY(10px) scale(0.86);
      pointer-events: none;
    }

    .combo.show {
      animation: comboPop 820ms cubic-bezier(0.2, 1.35, 0.25, 1) forwards;
    }

    .board {
      width: min(92vw, 620px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(12px, 3vw, 24px);
      padding: clamp(18px, 4vw, 30px);
      border: 4px solid rgba(101, 63, 32, 0.32);
      border-radius: 8px;
      background:
        linear-gradient(45deg, rgba(255, 241, 181, 0.28) 25%, transparent 25% 50%, rgba(255, 241, 181, 0.28) 50% 75%, transparent 75%) 0 0 / 44px 44px,
        radial-gradient(circle at 12px 12px, rgba(255, 255, 255, 0.2) 0 5px, transparent 6px) 0 0 / 42px 42px,
        linear-gradient(180deg, #bedf8f, #83ba5d);
      box-shadow: inset 0 -14px 0 rgba(94, 138, 57, 0.32), 0 18px 28px rgba(93, 68, 36, 0.2);
    }

    .hole {
      position: relative;
      aspect-ratio: 1 / 0.78;
      border: 0;
      border-radius: 50%;
      background:
        linear-gradient(115deg, transparent 0 22%, rgba(255, 228, 166, 0.22) 23% 27%, transparent 28% 52%, rgba(255, 228, 166, 0.16) 53% 58%, transparent 59%),
        repeating-radial-gradient(ellipse at center, transparent 0 9px, rgba(255, 222, 166, 0.23) 10px 13px),
        radial-gradient(ellipse at center, #241611 0 31%, #3e2418 32% 44%, var(--wood-dark) 45% 56%, var(--wood) 57% 74%, #d29456 75% 100%);
      box-shadow:
        inset 0 13px 15px rgba(0, 0, 0, 0.4),
        0 8px 0 rgba(92, 119, 57, 0.32),
        0 0 0 4px rgba(255, 241, 200, 0.55),
        0 0 0 9px rgba(116, 73, 36, 0.12);
      cursor: pointer;
      overflow: hidden;
      touch-action: manipulation;
    }

    .hole::before {
      content: "";
      position: absolute;
      inset: 12% 8% 45%;
      border-radius: 50%;
      background: linear-gradient(100deg, transparent 8%, rgba(255, 228, 172, 0.22) 10% 15%, transparent 17% 33%, rgba(255, 228, 172, 0.16) 35% 41%, transparent 43%);
      z-index: 1;
      pointer-events: none;
    }

    .hole::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: 4%;
      height: 25%;
      border-radius: 50%;
      background: rgba(41, 24, 14, 0.46);
      z-index: 4;
    }

    .mole {
      position: absolute;
      left: 50%;
      bottom: 3%;
      z-index: 3;
      transform: translate(-50%, 98%) scale(0.78);
      width: clamp(70px, 15vw, 122px);
      aspect-ratio: 1 / 0.92;
      filter: drop-shadow(0 7px 1px rgba(53, 28, 13, 0.24));
      pointer-events: none;
      transition: transform 260ms cubic-bezier(0.2, 1.55, 0.26, 1);
    }

    .golden-hamster {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 48% 48% 44% 44%;
      background:
        radial-gradient(circle at 32% 61%, #fff0c6 0 12%, transparent 13%),
        radial-gradient(circle at 68% 61%, #fff0c6 0 12%, transparent 13%),
        radial-gradient(circle at 50% 76%, #fff8dc 0 20%, transparent 21%),
        linear-gradient(180deg, #f7c957 0%, #eaa637 66%, #c97927 100%);
      border: 3px solid #72441f;
      box-shadow:
        inset 0 8px 0 rgba(255, 239, 166, 0.38),
        inset 0 -9px 0 rgba(156, 89, 28, 0.18);
    }

    .golden-hamster::before,
    .golden-hamster::after {
      content: "";
      position: absolute;
      top: -14%;
      width: 31%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe6a8 0 42%, #d99034 43% 100%);
      border: 3px solid #72441f;
      z-index: -1;
    }

    .golden-hamster::before {
      left: 7%;
    }

    .golden-hamster::after {
      right: 7%;
    }

    .hamster-eye {
      position: absolute;
      top: 38%;
      width: 10%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #392114;
      box-shadow: inset 2px 2px 0 rgba(255, 255, 255, 0.65);
    }

    .hamster-eye.left {
      left: 31%;
    }

    .hamster-eye.right {
      right: 31%;
    }

    .hamster-nose {
      position: absolute;
      left: 50%;
      top: 54%;
      width: 10%;
      aspect-ratio: 1.25 / 1;
      border-radius: 50%;
      background: #6c351f;
      transform: translateX(-50%);
    }

    .hamster-mouth {
      position: absolute;
      left: 50%;
      top: 65%;
      width: 20%;
      height: 10%;
      transform: translateX(-50%);
      border-bottom: 3px solid #8a4b2a;
      border-radius: 0 0 999px 999px;
    }

    .hamster-cheek {
      position: absolute;
      top: 59%;
      width: 17%;
      aspect-ratio: 1 / 0.72;
      border-radius: 50%;
      background: rgba(255, 128, 132, 0.38);
    }

    .hamster-cheek.left {
      left: 14%;
    }

    .hamster-cheek.right {
      right: 14%;
    }

    .hamster-paw {
      position: absolute;
      bottom: 7%;
      width: 19%;
      height: 20%;
      border-radius: 50%;
      background: #fff0c6;
      border: 2px solid rgba(114, 68, 31, 0.58);
    }

    .hamster-paw.left {
      left: 20%;
      rotate: 14deg;
    }

    .hamster-paw.right {
      right: 20%;
      rotate: -14deg;
    }

    .hole.up .mole {
      transform: translate(-50%, 9%) scale(1);
      animation: moleBounce 410ms cubic-bezier(0.18, 1.75, 0.3, 1), wiggle 540ms 420ms ease-in-out infinite alternate;
    }

    .hole.hit {
      animation: bonk 220ms ease;
    }

    .hole.combo-hit {
      box-shadow:
        inset 0 13px 15px rgba(0, 0, 0, 0.4),
        0 8px 0 rgba(92, 119, 57, 0.32),
        0 0 0 7px rgba(255, 211, 107, 0.62);
    }

    .hole.miss {
      animation: holeShake 220ms ease;
    }

    .pop {
      position: absolute;
      left: 50%;
      top: 12%;
      z-index: 8;
      transform: translateX(-50%);
      font-weight: 900;
      font-size: clamp(1.2rem, 3.5vw, 1.75rem);
      pointer-events: none;
      text-shadow: 0 2px 0 #fff8dd;
      animation: floatScore 680ms ease-out forwards;
    }

    .pop.good {
      color: #21925c;
    }

    .pop.bad {
      color: var(--red);
    }

    .particle {
      position: absolute;
      left: 50%;
      top: 32%;
      z-index: 9;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--particle-color);
      pointer-events: none;
      animation: particleBurst 620ms ease-out forwards;
    }

    .flying-mole {
      position: fixed;
      z-index: 20;
      width: clamp(72px, 13vw, 112px);
      aspect-ratio: 1 / 0.92;
      pointer-events: none;
      animation: flyMole 680ms ease-out forwards;
      filter: drop-shadow(0 8px 1px rgba(83, 45, 23, 0.22));
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(114, 84, 45, 0.22);
      backdrop-filter: blur(5px);
      z-index: 30;
    }

    .overlay.show {
      display: grid;
    }

    .dialog {
      width: min(92vw, 390px);
      border-radius: 8px;
      background: #fff0c8;
      border: 4px solid rgba(104, 65, 35, 0.32);
      box-shadow: 0 14px 0 rgba(91, 48, 24, 0.2), 0 24px 44px rgba(47, 37, 28, 0.28);
      padding: 26px 22px;
      text-align: center;
    }

    .dialog h2 {
      margin: 0 0 10px;
      font-size: 2rem;
      color: #794523;
    }

    .final-score {
      margin: 8px 0 22px;
      font-size: 1.55rem;
      font-weight: 900;
      color: #28746b;
    }

    .restart-button {
      min-width: 180px;
      min-height: 48px;
      padding: 0 18px;
    }

    @keyframes moleBounce {
      0% {
        transform: translate(-50%, 100%) scale(0.72);
      }
      68% {
        transform: translate(-50%, 0%) scale(1.08);
      }
      100% {
        transform: translate(-50%, 9%) scale(1);
      }
    }

    @keyframes wiggle {
      from {
        rotate: -3deg;
      }
      to {
        rotate: 3deg;
      }
    }

    @keyframes bonk {
      50% {
        transform: scale(0.94);
      }
    }

    @keyframes holeShake {
      25% {
        transform: translateX(-5px);
      }
      75% {
        transform: translateX(5px);
      }
    }

    @keyframes screenShake {
      20% {
        transform: translate(-4px, 2px);
      }
      40% {
        transform: translate(4px, -2px);
      }
      60% {
        transform: translate(-2px, -1px);
      }
      80% {
        transform: translate(2px, 1px);
      }
    }

    @keyframes floatScore {
      from {
        opacity: 1;
        translate: 0 0;
        scale: 0.86;
      }
      to {
        opacity: 0;
        translate: 0 -44px;
        scale: 1.25;
      }
    }

    @keyframes particleBurst {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(0deg) scale(1);
      }
      to {
        opacity: 0;
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(220deg) scale(0.3);
      }
    }

    @keyframes flyMole {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(0deg) scale(1);
      }
      70% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--fly-x)), calc(-50% - 160px)) rotate(720deg) scale(0.45);
      }
    }

    @keyframes comboPop {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.78);
      }
      20%, 70% {
        opacity: 1;
        transform: translateY(0) scale(1.08);
      }
      100% {
        opacity: 0;
        transform: translateY(-10px) scale(0.96);
      }
    }

    @keyframes redPulse {
      from {
        transform: scale(1);
        text-shadow: 0 0 0 rgba(232, 72, 85, 0);
      }
      to {
        transform: scale(1.12);
        text-shadow: 0 0 14px rgba(232, 72, 85, 0.65);
      }
    }

    @media (max-width: 560px) {
      main {
        padding: 14px;
      }

      .hud {
        grid-template-columns: 1fr 1fr;
      }

      .hud .panel:last-child {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>打地鼠</h1>

    <section class="hud" aria-label="遊戲狀態">
      <div class="panel">
        <span class="label">分數</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="panel">
        <span class="label">倒數</span>
        <span class="value" id="timeValue"><span id="time">30</span> 秒</span>
      </div>
      <div class="panel">
        <button class="start-button" id="startButton" type="button">開始遊戲</button>
      </div>
    </section>

    <div class="combo" id="comboText" aria-live="polite"></div>
    <section class="board" id="board" aria-label="九宮格地洞"></section>
  </main>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="dialog">
      <h2 id="resultTitle">時間到！</h2>
      <div class="final-score" id="finalScore">最終分數：0</div>
      <button class="restart-button" id="restartButton" type="button">重新開始</button>
    </div>
  </div>

  <script>
    const board = document.querySelector("#board");
    const scoreEl = document.querySelector("#score");
    const timeEl = document.querySelector("#time");
    const timeValue = document.querySelector("#timeValue");
    const startButton = document.querySelector("#startButton");
    const restartButton = document.querySelector("#restartButton");
    const overlay = document.querySelector("#overlay");
    const finalScore = document.querySelector("#finalScore");
    const comboText = document.querySelector("#comboText");

    const holes = [];
    const particleColors = ["#ff7f7f", "#ffd36b", "#89c997", "#7ec8e3", "#f4a7c5", "#fff1a6"];
    let score = 0;
    let combo = 0;
    let timeLeft = 30;
    let activeHole = null;
    let moleTimer = null;
    let spawnTimer = null;
    let countdownTimer = null;
    let audioContext = null;
    let playing = false;

    const hamsterTemplate = `
      <span class="golden-hamster" aria-hidden="true">
        <span class="hamster-eye left"></span>
        <span class="hamster-eye right"></span>
        <span class="hamster-nose"></span>
        <span class="hamster-mouth"></span>
        <span class="hamster-cheek left"></span>
        <span class="hamster-cheek right"></span>
        <span class="hamster-paw left"></span>
        <span class="hamster-paw right"></span>
      </span>
    `;

    for (let i = 0; i < 9; i += 1) {
      const hole = document.createElement("button");
      hole.className = "hole";
      hole.type = "button";
      hole.setAttribute("aria-label", `第 ${i + 1} 個洞`);
      hole.dataset.index = String(i);

      const mole = document.createElement("span");
      mole.className = "mole";
      mole.innerHTML = hamsterTemplate;
      hole.appendChild(mole);

      hole.addEventListener("click", () => handleHoleClick(hole));
      holes.push(hole);
      board.appendChild(hole);
    }

    startButton.addEventListener("click", startGame);
    restartButton.addEventListener("click", startGame);

    function startGame() {
      ensureAudio();
      score = 0;
      combo = 0;
      timeLeft = 30;
      playing = true;
      overlay.classList.remove("show");
      comboText.classList.remove("show");
      startButton.textContent = "遊戲中";
      startButton.disabled = true;
      updateHud();
      hideMole();
      spawnMole();

      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        timeLeft -= 1;
        updateHud();

        if (timeLeft > 0 && timeLeft <= 5) {
          playTick();
        }

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    function spawnMole() {
      if (!playing) return;

      hideMole();
      const candidates = holes.filter((hole) => hole !== activeHole);
      const nextHole = candidates[Math.floor(Math.random() * candidates.length)] || holes[0];

      activeHole = nextHole;
      activeHole.classList.add("up");
      playBoop();

      clearTimeout(moleTimer);
      moleTimer = setTimeout(() => {
        hideMole();
        scheduleNextMole();
      }, 1500);
    }

    function scheduleNextMole() {
      clearTimeout(spawnTimer);
      spawnTimer = setTimeout(spawnMole, 260);
    }

    function hideMole() {
      if (activeHole) {
        activeHole.classList.remove("up");
      }
      activeHole = null;
      clearTimeout(moleTimer);
    }

    function handleHoleClick(hole) {
      if (!playing) return;

      if (hole === activeHole && hole.classList.contains("up")) {
        score += 10;
        combo += 1;
        showPop(hole, "+10", "good");
        createParticles(hole, combo >= 3 ? 18 : 10);
        flyMoleFrom(hole);
        playHit();
        flash(hole, "hit");

        if (combo >= 3) {
          showCombo(combo);
          flash(hole, "combo-hit", 360);
          createParticles(hole, 14);
        }

        hideMole();
        scheduleNextMole();
      } else {
        score = Math.max(0, score - 5);
        combo = 0;
        showPop(hole, "-5", "bad");
        playOops();
        shakeScreen();
        flash(hole, "miss");
      }

      updateHud();
    }

    function showPop(hole, text, type) {
      const pop = document.createElement("span");
      pop.className = `pop ${type}`;
      pop.textContent = text;
      hole.appendChild(pop);
      setTimeout(() => pop.remove(), 700);
    }

    function createParticles(hole, amount) {
      for (let i = 0; i < amount; i += 1) {
        const particle = document.createElement("span");
        const angle = (Math.PI * 2 * i) / amount;
        const distance = 28 + Math.random() * 46;
        particle.className = "particle";
        particle.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
        particle.style.setProperty("--dy", `${Math.sin(angle) * distance - 18}px`);
        particle.style.setProperty("--particle-color", particleColors[i % particleColors.length]);
        hole.appendChild(particle);
        setTimeout(() => particle.remove(), 650);
      }
    }

    function flyMoleFrom(hole) {
      const rect = hole.getBoundingClientRect();
      const flying = document.createElement("span");
      flying.className = "flying-mole";
      flying.innerHTML = hamsterTemplate;
      flying.style.left = `${rect.left + rect.width / 2}px`;
      flying.style.top = `${rect.top + rect.height * 0.28}px`;
      flying.style.setProperty("--fly-x", `${Math.random() > 0.5 ? 95 : -95}px`);
      document.body.appendChild(flying);
      setTimeout(() => flying.remove(), 700);
    }

    function showCombo(count) {
      comboText.textContent = `COMBO ×${count}!`;
      comboText.classList.remove("show");
      void comboText.offsetWidth;
      comboText.classList.add("show");
    }

    function flash(hole, className, duration = 230) {
      hole.classList.remove(className);
      void hole.offsetWidth;
      hole.classList.add(className);
      setTimeout(() => hole.classList.remove(className), duration);
    }

    function shakeScreen() {
      document.body.classList.remove("screen-shake");
      void document.body.offsetWidth;
      document.body.classList.add("screen-shake");
      setTimeout(() => document.body.classList.remove("screen-shake"), 260);
    }

    function updateHud() {
      scoreEl.textContent = String(score);
      timeEl.textContent = String(timeLeft);
      timeValue.classList.toggle("danger", playing && timeLeft <= 5);
    }

    function endGame() {
      playing = false;
      clearInterval(countdownTimer);
      clearTimeout(spawnTimer);
      hideMole();
      comboText.classList.remove("show");
      timeValue.classList.remove("danger");
      startButton.textContent = "開始遊戲";
      startButton.disabled = false;
      finalScore.textContent = `最終分數：${score}`;
      overlay.classList.add("show");
    }

    function ensureAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function tone(frequency, duration, type = "sine", volume = 0.12, when = 0, slideTo = null) {
      if (!audioContext) return;

      const start = audioContext.currentTime + when;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, start);

      if (slideTo) {
        oscillator.frequency.exponentialRampToValueAtTime(slideTo, start + duration);
      }

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(start);
      oscillator.stop(start + duration + 0.03);
    }

    function noise(duration, volume = 0.08) {
      if (!audioContext) return;

      const bufferSize = audioContext.sampleRate * duration;
      const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i += 1) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }

      const source = audioContext.createBufferSource();
      const gain = audioContext.createGain();
      gain.gain.value = volume;
      source.buffer = buffer;
      source.connect(gain);
      gain.connect(audioContext.destination);
      source.start();
    }

    function playBoop() {
      ensureAudio();
      tone(340, 0.11, "sine", 0.1, 0, 690);
      tone(760, 0.08, "triangle", 0.055, 0.045);
    }

    function playHit() {
      ensureAudio();
      noise(0.08, 0.09);
      tone(150, 0.09, "square", 0.08, 0, 70);
      tone(620, 0.1, "triangle", 0.06, 0.025);
    }

    function playOops() {
      ensureAudio();
      tone(520, 0.13, "sawtooth", 0.055, 0, 350);
      tone(270, 0.16, "triangle", 0.07, 0.12, 190);
    }

    function playTick() {
      ensureAudio();
      tone(920, 0.045, "square", 0.045);
      tone(460, 0.05, "square", 0.035, 0.055);
    }
  </script>
</body>
