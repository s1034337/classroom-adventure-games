<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打怪 RPG 進階版</title>
  <style>
    :root {
      --bg: #172033;
      --panel: #fff3d6;
      --panel-2: #ffe5a8;
      --ink: #2d241c;
      --muted: #765f4a;
      --red: #d4473f;
      --green: #3aa86d;
      --blue: #4a82d4;
      --gold: #e3a634;
      --purple: #8d62d6;
      --line: rgba(58, 37, 20, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(227, 166, 52, 0.16) 0 110px, transparent 112px),
        radial-gradient(circle at 85% 12%, rgba(141, 98, 214, 0.18) 0 130px, transparent 132px),
        linear-gradient(135deg, rgba(255, 255, 255, 0.05) 25%, transparent 25% 50%, rgba(255, 255, 255, 0.05) 50% 75%, transparent 75%) 0 0 / 44px 44px,
        linear-gradient(180deg, #253656, var(--bg));
    }

    .map-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(255, 243, 214, 0.95);
      color: #573721;
      border: 2px solid rgba(255, 230, 160, 0.38);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.16);
      text-decoration: none;
      font-weight: 900;
    }

    main {
      width: min(1120px, 94vw);
      margin: 0 auto;
      padding: 24px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
      color: #fff8e8;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      text-shadow: 0 4px 0 rgba(0, 0, 0, 0.28);
    }

    .coin-counter {
      min-width: 132px;
      padding: 12px 16px;
      border: 3px solid rgba(255, 230, 160, 0.42);
      border-radius: 8px;
      background: rgba(30, 24, 19, 0.46);
      text-align: center;
      font-size: 1.45rem;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
    }

    .screen {
      display: none;
      border: 4px solid rgba(255, 231, 164, 0.26);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(106, 70, 32, 0.04) 1px, transparent 1px) 0 0 / 28px 28px,
        var(--panel);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.24);
      padding: clamp(16px, 3vw, 28px);
    }

    .screen.show {
      display: block;
    }

    .loading {
      min-height: 360px;
      display: none;
      place-items: center;
      text-align: center;
      font-weight: 900;
      color: #fff8e8;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.08) 0 2px, transparent 3px) 0 0 / 26px 26px,
        rgba(21, 29, 46, 0.9);
    }

    .loading.show {
      display: grid;
    }

    .battle-top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .fighter {
      min-height: 210px;
      border: 3px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 235, 0.76);
      padding: 14px;
      display: grid;
      align-content: center;
      gap: 10px;
      text-align: center;
    }

    .sprite {
      font-size: clamp(4rem, 10vw, 6.8rem);
      line-height: 1;
      filter: drop-shadow(0 8px 0 rgba(85, 52, 25, 0.16));
    }

    .sprite.hit {
      animation: hitShake 260ms ease;
    }

    .name {
      font-size: 1.25rem;
      font-weight: 900;
      color: #573721;
    }

    .hpbar {
      height: 22px;
      border: 2px solid rgba(70, 48, 28, 0.22);
      border-radius: 999px;
      background: #dccaa6;
      overflow: hidden;
    }

    .hpfill {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #35b36f, #9be26e);
      transition: width 260ms ease;
    }

    .hpfill.low {
      background: linear-gradient(90deg, #db3e35, #ff986a);
    }

    .hptext {
      font-weight: 900;
      color: var(--muted);
    }

    .versus {
      display: grid;
      place-items: center;
      color: #8c2f24;
      font-size: clamp(1.7rem, 4vw, 3rem);
      font-weight: 900;
      text-shadow: 0 2px 0 #fff4d2;
    }

    .question-box {
      position: relative;
      margin: 0 auto 16px;
      max-width: 820px;
      padding: 18px;
      border: 3px solid rgba(87, 55, 28, 0.22);
      border-radius: 8px;
      background: #fffaf0;
      text-align: center;
    }

    .stage {
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 900;
    }

    .question {
      margin: 0;
      font-size: clamp(1.35rem, 3.2vw, 2.15rem);
      line-height: 1.45;
      font-weight: 900;
      color: #35261c;
    }

    .question-image {
      display: none;
      width: 100%;
      max-height: min(54vh, 620px);
      margin-top: 14px;
      border: 3px solid rgba(85, 54, 28, 0.2);
      border-radius: 8px;
      background: #fff;
      object-fit: contain;
    }

    .question-image.show {
      display: block;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      max-width: 820px;
      margin: 0 auto;
    }

    .answer {
      min-height: 62px;
      border: 3px solid rgba(85, 54, 28, 0.18);
      border-radius: 8px;
      background: linear-gradient(180deg, #fff8e6, #efcf86);
      color: #2b2118;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      font-size: 1.05rem;
      box-shadow: 0 6px 0 rgba(103, 65, 29, 0.18);
      transition: transform 120ms ease, border-color 120ms ease, filter 120ms ease;
    }

    .answer:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: rgba(74, 130, 212, 0.46);
    }

    .answer:disabled {
      cursor: default;
      filter: saturate(0.72);
    }

    .answer.correct {
      background: linear-gradient(180deg, #dff7d7, #75c97c);
      border-color: rgba(58, 168, 109, 0.5);
    }

    .answer.wrong {
      background: linear-gradient(180deg, #ffd9d4, #e26e63);
      border-color: rgba(212, 71, 63, 0.5);
    }

    .battle-tools {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .tool,
    .primary {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      box-shadow: 0 5px 0 rgba(51, 31, 19, 0.28);
    }

    .tool {
      background: #fff2c8;
      color: #553823;
      border: 2px solid rgba(101, 65, 34, 0.18);
    }

    .tool:disabled {
      cursor: default;
      opacity: 0.48;
    }

    .primary {
      background: linear-gradient(180deg, #4a82d4, #315ea3);
      color: #fff;
    }

    .message {
      min-height: 48px;
      margin-top: 14px;
      padding: 12px 14px;
      border: 2px solid rgba(87, 55, 28, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      text-align: center;
      font-weight: 900;
      color: var(--muted);
    }

    .message.good {
      color: var(--green);
      background: rgba(220, 248, 225, 0.74);
    }

    .message.bad {
      color: var(--red);
      background: rgba(255, 224, 218, 0.74);
    }

    .shop-title,
    .result-title {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: #673d25;
      text-align: center;
    }

    .shop-subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      text-align: center;
      font-weight: 900;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .shop-card {
      border: 3px solid rgba(87, 55, 28, 0.18);
      border-radius: 8px;
      background: #fffaf0;
      padding: 16px;
      text-align: center;
      box-shadow: 0 8px 0 rgba(83, 51, 27, 0.1);
    }

    .item-icon {
      font-size: 3rem;
      line-height: 1;
    }

    .item-name {
      margin: 8px 0 6px;
      font-size: 1.25rem;
      font-weight: 900;
      color: #52331f;
    }

    .item-desc {
      min-height: 54px;
      margin: 0 0 10px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
    }

    .buy {
      width: 100%;
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #e5b04d, #bd7330);
      color: #fff9e9;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      box-shadow: 0 4px 0 #7a421f;
    }

    .buy:disabled {
      cursor: default;
      opacity: 0.48;
    }

    .inventory {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
      font-weight: 900;
      color: #fff8e8;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(38, 29, 21, 0.42);
      border: 2px solid rgba(255, 230, 160, 0.22);
    }

    .result-card {
      max-width: 620px;
      margin: 0 auto;
      border: 3px solid rgba(87, 55, 28, 0.18);
      border-radius: 8px;
      background: #fffaf0;
      padding: 20px;
      text-align: center;
    }

    .result-list {
      display: grid;
      gap: 10px;
      margin: 16px 0 18px;
      font-size: 1.2rem;
      font-weight: 900;
      color: #563a29;
    }

    @keyframes hitShake {
      25% {
        transform: translateX(-8px) rotate(-5deg);
      }
      75% {
        transform: translateX(8px) rotate(5deg);
      }
    }

    @media (max-width: 820px) {
      header {
        grid-template-columns: 1fr;
      }

      .battle-top {
        grid-template-columns: 1fr;
      }

      .versus {
        min-height: 48px;
      }

      .answers,
      .shop-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <a class="map-link" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <main>
    <header>
      <h1>打怪 RPG 進階版</h1>
      <div class="coin-counter">💰 <span id="coinText">0</span></div>
    </header>

    <section class="loading" id="loadingScreen">
      <div>
        <h2>題庫載入中...</h2>
        <p>正在讀取本機解析卷圖片與答案</p>
      </div>
    </section>

    <section class="screen" id="battleScreen">
      <div class="inventory" id="inventory"></div>

      <div class="battle-top">
        <div class="fighter">
          <div class="sprite" id="playerSprite">🧙</div>
          <div class="name">我方巫師</div>
          <div class="hpbar"><div class="hpfill" id="playerHpFill"></div></div>
          <div class="hptext" id="playerHpText">HP 100 / 100</div>
        </div>

        <div class="versus">VS</div>

        <div class="fighter">
          <div class="sprite" id="monsterSprite">🐺</div>
          <div class="name" id="monsterName">野狼</div>
          <div class="hpbar"><div class="hpfill" id="monsterHpFill"></div></div>
          <div class="hptext" id="monsterHpText">HP 100 / 100</div>
        </div>
      </div>

      <div class="question-box">
        <div class="stage" id="stageText">第 1 關</div>
        <p class="question" id="questionText">題目</p>
        <img class="question-image" id="questionImage" alt="會考國文解析卷題目頁">
      </div>

      <div class="answers" id="answers"></div>

      <div class="battle-tools">
        <button class="tool" id="usePotion" type="button">🧪 使用紅藥水</button>
      </div>

      <div class="message" id="battleMessage">選出正確答案來攻擊怪物。</div>
    </section>

    <section class="screen" id="shopScreen">
      <h2 class="shop-title">商店</h2>
      <p class="shop-subtitle" id="shopSubtitle">擊敗怪物後，可以購買道具再前往下一關。</p>

      <div class="inventory" id="shopInventory"></div>

      <div class="shop-grid">
        <div class="shop-card">
          <div class="item-icon">🧪</div>
          <div class="item-name">紅藥水</div>
          <p class="item-desc">戰鬥中使用，補 50 HP。</p>
          <button class="buy" data-item="potion" type="button">購買 30 金幣</button>
        </div>
        <div class="shop-card">
          <div class="item-icon">💎</div>
          <div class="item-name">攻擊水晶</div>
          <p class="item-desc">下一題答對暴擊，怪物 -50 HP。</p>
          <button class="buy" data-item="crystal" type="button">購買 40 金幣</button>
        </div>
        <div class="shop-card">
          <div class="item-icon">🛡</div>
          <div class="item-name">救命符</div>
          <p class="item-desc">HP 歸零時自動復活，剩 1 HP。</p>
          <button class="buy" data-item="charm" type="button">購買 80 金幣</button>
        </div>
      </div>

      <div class="message" id="shopMessage">請選購道具，或直接前往下一關。</div>
      <div style="text-align:center; margin-top: 14px;">
        <button class="primary" id="nextStageButton" type="button">前往下一關</button>
      </div>
    </section>

    <section class="screen" id="resultScreen">
      <div class="result-card">
        <h2 class="result-title">通關成功！</h2>
        <div class="result-list">
          <div id="correctResult">答對題數：0</div>
          <div id="coinResult">剩餘金幣：0</div>
          <div id="potionResult">用了幾瓶藥水：0</div>
        </div>
        <button class="primary" id="restartButton" type="button">重新挑戰</button>
      </div>
    </section>
  </main>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQjKai_A7wVkd6K7jZNd4BBry8MWOYstDhlsIJZdTZFrOeciOi7xKv_3_KjEB-XsmNJWgL7QrFhpzM_/pub?output=csv";

    const FALLBACK_QUESTIONS = [
      ...buildExamQuestions()
    ];

    const MONSTERS = [
      { icon: "🐺", name: "野狼", hp: 100 },
      { icon: "🦂", name: "毒蠍", hp: 100 },
      { icon: "👹", name: "惡鬼", hp: 100 },
      { icon: "🐲", name: "巨龍", hp: 100 },
      { icon: "👑", name: "魔王", hp: 100 }
    ];

    const ITEMS = {
      potion: { price: 30 },
      crystal: { price: 40 },
      charm: { price: 80 }
    };

    const loadingScreen = document.querySelector("#loadingScreen");
    const battleScreen = document.querySelector("#battleScreen");
    const shopScreen = document.querySelector("#shopScreen");
    const resultScreen = document.querySelector("#resultScreen");
    const coinText = document.querySelector("#coinText");
    const inventory = document.querySelector("#inventory");
    const shopInventory = document.querySelector("#shopInventory");
    const playerSprite = document.querySelector("#playerSprite");
    const monsterSprite = document.querySelector("#monsterSprite");
    const monsterName = document.querySelector("#monsterName");
    const playerHpFill = document.querySelector("#playerHpFill");
    const monsterHpFill = document.querySelector("#monsterHpFill");
    const playerHpText = document.querySelector("#playerHpText");
    const monsterHpText = document.querySelector("#monsterHpText");
    const stageText = document.querySelector("#stageText");
    const questionText = document.querySelector("#questionText");
    const questionImage = document.querySelector("#questionImage");
    const answers = document.querySelector("#answers");
    const battleMessage = document.querySelector("#battleMessage");
    const shopMessage = document.querySelector("#shopMessage");
    const shopSubtitle = document.querySelector("#shopSubtitle");
    const usePotion = document.querySelector("#usePotion");
    const nextStageButton = document.querySelector("#nextStageButton");
    const restartButton = document.querySelector("#restartButton");
    const correctResult = document.querySelector("#correctResult");
    const coinResult = document.querySelector("#coinResult");
    const potionResult = document.querySelector("#potionResult");

    let questions = [];
    let questionBag = [];
    let currentQuestion = null;
    let stageIndex = 0;
    let playerHp = 100;
    let monsterHp = 100;
    let coins = 0;
    let correctCount = 0;
    let usedPotions = 0;
    let inventoryItems = {
      potion: 0,
      crystal: 0,
      charm: 0
    };
    let locked = false;

    document.querySelectorAll(".buy").forEach((button) => {
      button.addEventListener("click", () => buyItem(button.dataset.item));
    });
    usePotion.addEventListener("click", drinkPotion);
    nextStageButton.addEventListener("click", goNextStage);
    restartButton.addEventListener("click", startGame);

    loadQuestions();

    async function loadQuestions() {
      showOnly("loading");
      const retryMessages = [
        "載入 Google Sheets 題庫中…",
        "網路不穩，第 2 次重試…",
        "網路不穩，第 3 次重試…"
      ];

      for (let attempt = 1; attempt <= 3; attempt += 1) {
        setLoadingText(retryMessages[attempt - 1], "正在讀取你提供的 Google Sheets CSV");

        try {
          const csvText = await fetchCsvWithRetry(CSV_URL);
          questions = parseQuestions(csvText);
          if (questions.length === 0) throw new Error("CSV 沒有可用題目");
          startGame();
          return;
        } catch (error) {
          console.warn(`題庫載入第 ${attempt} 次失敗`, error);

          if (attempt < 3) {
            await delay(attempt * 1000);
          }
        }
      }

      setLoadingText("線上題庫載入失敗，改用本機備援題庫", "正在讀取本機解析卷圖片與答案");
      questions = FALLBACK_QUESTIONS;
      await delay(1200);
      startGame();
    }

    function buildExamQuestions() {
      const answers = "BADADCDCCDDBAABDABDADBCBABDBADCCABCCCACBCB".split("");
      return answers.map((answer, index) => {
        const number = index + 1;
        const page = examPageForQuestion(number);
        const choices = ["A", "B", "C", "D"];
        return {
          question: `115 年會考國文第 ${number} 題：請閱讀下方解析卷頁面，選出正確答案。`,
          correct: answer,
          wrong: choices.filter((choice) => choice !== answer),
          image: `exam_pages/page-${String(page).padStart(2, "0")}.png`,
          id: number
        };
      });
    }

    function examPageForQuestion(number) {
      if (number <= 5) return 1;
      if (number <= 9) return 2;
      if (number <= 13) return 3;
      if (number <= 17) return 4;
      if (number <= 21) return 5;
      if (number <= 24) return 6;
      if (number <= 27) return 7;
      if (number <= 31) return 8;
      if (number <= 34) return 9;
      if (number <= 38) return 10;
      return 11;
    }

    async function fetchCsvWithRetry(url) {
      const response = await fetch(withCacheBuster(url), { cache: "no-store" });
      if (!response.ok) throw new Error(`CSV 載入失敗：HTTP ${response.status}`);

      const csvText = await response.text();
      if (csvText.trimStart().startsWith("<")) {
        throw new Error("收到 HTML 錯誤頁，不是 CSV");
      }

      return csvText;
    }

    function withCacheBuster(url) {
      return `${url}${url.includes("?") ? "&" : "?"}t=${Date.now()}`;
    }

    function setLoadingText(text, detailText = "正在讀取本機解析卷圖片與答案") {
      const title = loadingScreen.querySelector("h2");
      const detail = loadingScreen.querySelector("p");
      title.textContent = text;
      detail.textContent = detailText;
    }

    function delay(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function startGame() {
      stageIndex = 0;
      playerHp = 100;
      monsterHp = 100;
      coins = 0;
      correctCount = 0;
      usedPotions = 0;
      inventoryItems = { potion: 0, crystal: 0, charm: 0 };
      questionBag = [];
      startStage();
    }

    function startStage() {
      playerHp = Math.max(playerHp, 1);
      monsterHp = MONSTERS[stageIndex].hp;
      locked = false;
      showOnly("battle");
      setBattleMessage("選出正確答案來攻擊怪物。");
      nextQuestion();
      render();
    }

    function retryStage() {
      playerHp = 100;
      monsterHp = MONSTERS[stageIndex].hp;
      locked = false;
      setBattleMessage(`沒有救命符，重新挑戰第 ${stageIndex + 1} 關。`, "bad");
      nextQuestion();
      render();
    }

    function nextQuestion() {
      currentQuestion = drawQuestion();
      const options = shuffle([
        currentQuestion.correct,
        ...currentQuestion.wrong
      ].filter((option) => option && option !== "空")).slice(0, 4);

      while (options.length < 4) {
        const extra = randomWrongOption(options);
        if (!extra) break;
        options.push(extra);
      }

      questionText.textContent = currentQuestion.question;
      if (currentQuestion.image) {
        questionImage.src = currentQuestion.image;
        questionImage.classList.add("show");
      } else {
        questionImage.removeAttribute("src");
        questionImage.classList.remove("show");
      }
      answers.innerHTML = "";
      shuffle(options).forEach((option, index) => {
        const button = document.createElement("button");
        button.className = "answer";
        button.type = "button";
        button.textContent = `${String.fromCharCode(65 + index)}. ${option}`;
        button.dataset.option = option;
        button.addEventListener("click", () => answerQuestion(button, option));
        answers.appendChild(button);
      });
    }

    function answerQuestion(button, option) {
      if (locked) return;
      locked = true;
      const isCorrect = option === currentQuestion.correct;
      disableAnswers();

      if (isCorrect) {
        const damage = inventoryItems.crystal > 0 ? 50 : 25;
        if (inventoryItems.crystal > 0) {
          inventoryItems.crystal -= 1;
        }
        monsterHp = Math.max(0, monsterHp - damage);
        coins += 5;
        correctCount += 1;
        button.classList.add("correct");
        bump(monsterSprite);
        setBattleMessage(`答對！巫師攻擊造成 ${damage} 傷害，獲得 5 金幣。`, "good");

        if (monsterHp <= 0) {
          render();
          setTimeout(defeatMonster, 900);
        } else {
          render();
          setTimeout(() => {
            locked = false;
            setBattleMessage("下一題來了，繼續攻擊！");
            nextQuestion();
          }, 900);
        }
      } else {
        playerHp = Math.max(0, playerHp - 25);
        button.classList.add("wrong");
        markCorrectAnswer();
        bump(playerSprite);
        setBattleMessage(`答錯！正確答案是「${currentQuestion.correct}」。怪物攻擊造成 25 傷害。`, "bad");
        render();

        setTimeout(() => {
          handlePlayerAfterDamage();
        }, 2000);
      }
    }

    function handlePlayerAfterDamage() {
      if (playerHp <= 0) {
        if (inventoryItems.charm > 0) {
          inventoryItems.charm -= 1;
          playerHp = 1;
          setBattleMessage("救命符發動！HP 回到 1，繼續戰鬥。", "good");
          locked = false;
          nextQuestion();
          render();
        } else {
          retryStage();
        }
      } else {
        locked = false;
        setBattleMessage("撐住了，繼續作答！");
        nextQuestion();
        render();
      }
    }

    function defeatMonster() {
      const drop = randomInt(20, 50);
      coins += drop;
      setBattleMessage(`擊敗 ${MONSTERS[stageIndex].name}！額外獲得 ${drop} 金幣。`, "good");
      render();

      setTimeout(() => {
        if (stageIndex >= MONSTERS.length - 1) {
          showResult();
        } else {
          showShop(drop);
        }
      }, 1000);
    }

    function showShop(drop) {
      showOnly("shop");
      shopSubtitle.textContent = `剛剛掉落 ${drop} 金幣。補給後前往第 ${stageIndex + 2} 關。`;
      shopMessage.textContent = "請選購道具，或直接前往下一關。";
      shopMessage.className = "message";
      render();
    }

    function goNextStage() {
      stageIndex += 1;
      playerHp = Math.min(100, playerHp + 25);
      startStage();
    }

    function buyItem(item) {
      const price = ITEMS[item].price;
      if (coins < price) {
        shopMessage.textContent = "金幣不足，還買不起這個道具。";
        shopMessage.className = "message bad";
        return;
      }

      coins -= price;
      inventoryItems[item] += 1;
      shopMessage.textContent = "購買成功！";
      shopMessage.className = "message good";
      render();
    }

    function drinkPotion() {
      if (locked || inventoryItems.potion <= 0 || playerHp >= 100) return;
      inventoryItems.potion -= 1;
      usedPotions += 1;
      playerHp = Math.min(100, playerHp + 50);
      setBattleMessage("使用紅藥水，HP 回復 50。", "good");
      render();
    }

    function showResult() {
      localStorage.setItem("cert_warrior", "true");
      showOnly("result");
      correctResult.textContent = `答對題數：${correctCount}`;
      coinResult.textContent = `剩餘金幣：${coins}`;
      potionResult.textContent = `用了幾瓶藥水：${usedPotions}`;
      render();
    }

    function render() {
      coinText.textContent = String(coins);
      const monster = MONSTERS[stageIndex] || MONSTERS[MONSTERS.length - 1];
      monsterSprite.textContent = monster.icon;
      monsterName.textContent = monster.name;
      stageText.textContent = `第 ${stageIndex + 1} 關 ${monster.icon} ${monster.name}`;
      updateHp(playerHpFill, playerHpText, playerHp, 100);
      updateHp(monsterHpFill, monsterHpText, monsterHp, monster.hp);
      renderInventory();
      usePotion.disabled = inventoryItems.potion <= 0 || playerHp >= 100 || locked;
      document.querySelectorAll(".buy").forEach((button) => {
        button.disabled = coins < ITEMS[button.dataset.item].price;
      });
    }

    function updateHp(fill, text, hp, max) {
      const percent = Math.max(0, Math.min(100, (hp / max) * 100));
      fill.style.width = `${percent}%`;
      fill.classList.toggle("low", percent <= 30);
      text.textContent = `HP ${hp} / ${max}`;
    }

    function renderInventory() {
      const html = `
        <span class="pill">🧪 紅藥水 × ${inventoryItems.potion}</span>
        <span class="pill">💎 攻擊水晶 × ${inventoryItems.crystal}</span>
        <span class="pill">🛡 救命符 × ${inventoryItems.charm}</span>
      `;
      inventory.innerHTML = html;
      shopInventory.innerHTML = html;
    }

    function showOnly(screen) {
      loadingScreen.classList.toggle("show", screen === "loading");
      battleScreen.classList.toggle("show", screen === "battle");
      shopScreen.classList.toggle("show", screen === "shop");
      resultScreen.classList.toggle("show", screen === "result");
    }

    function setBattleMessage(text, type = "") {
      battleMessage.textContent = text;
      battleMessage.className = `message ${type}`.trim();
    }

    function disableAnswers() {
      answers.querySelectorAll("button").forEach((answer) => {
        answer.disabled = true;
      });
    }

    function markCorrectAnswer() {
      answers.querySelectorAll("button").forEach((answer) => {
        if (answer.dataset.option === currentQuestion.correct) {
          answer.classList.add("correct");
        }
      });
    }

    function bump(element) {
      element.classList.remove("hit");
      void element.offsetWidth;
      element.classList.add("hit");
      setTimeout(() => element.classList.remove("hit"), 280);
    }

    function drawQuestion() {
      if (questionBag.length === 0) {
        questionBag = shuffle([...questions]);
      }
      return questionBag.pop();
    }

    function randomWrongOption(existing) {
      const pool = questions
        .flatMap((question) => [question.correct, ...question.wrong])
        .filter((option) => option && option !== "空" && !existing.includes(option));
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function parseQuestions(csvText) {
      const rows = parseCsv(csvText).filter((row) => row.some((cell) => cell.trim()));
      const dataRows = rows.slice(1);
      return dataRows.map((row, index) => {
        const question = (row[0] || "").trim();
        const correct = (row[1] || "").trim();
        const wrong = [row[2], row[3], row[4]]
          .map((cell) => (cell || "").trim())
          .filter((cell) => cell && cell !== "空");
        return { question, correct, wrong, id: index };
      }).filter((item) => item.question && item.correct && item.wrong.length > 0);
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell);
      rows.push(row);
      return rows;
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
  </script>
</body>
