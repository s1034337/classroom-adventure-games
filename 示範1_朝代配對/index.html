<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>朝代配對</title>
  <style>
    :root {
      --paper: #fff8e8;
      --paper-deep: #f0d7a4;
      --ink: #3f2f25;
      --muted: #806d5a;
      --red: #b64b39;
      --gold: #d69a33;
      --jade: #3f8f74;
      --blue: #5278ad;
      --line: rgba(75, 54, 38, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 12%, rgba(209, 83, 61, 0.14) 0 90px, transparent 92px),
        radial-gradient(circle at 88% 18%, rgba(63, 143, 116, 0.13) 0 110px, transparent 112px),
        linear-gradient(135deg, rgba(130, 88, 43, 0.06) 25%, transparent 25% 50%, rgba(130, 88, 43, 0.06) 50% 75%, transparent 75%) 0 0 / 42px 42px,
        linear-gradient(180deg, #fffdf5, var(--paper));
    }

    .map-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(255, 248, 232, 0.95);
      color: #5a3924;
      border: 2px solid rgba(75, 54, 38, 0.2);
      box-shadow: 0 4px 0 rgba(77, 53, 31, 0.12);
      text-decoration: none;
      font-weight: 900;
    }

    main {
      width: min(1120px, 94vw);
      margin: 0 auto;
      padding: 26px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      color: #6f3e27;
      text-shadow: 0 3px 0 #fff0c2;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 700;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 8px;
      align-items: center;
    }

    .stat {
      min-width: 92px;
      padding: 10px 12px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 248, 232, 0.92);
      box-shadow: 0 5px 0 rgba(77, 53, 31, 0.12);
      text-align: center;
      font-weight: 900;
    }

    .stat span {
      display: block;
      margin-top: 2px;
      color: var(--blue);
      font-size: 1.45rem;
    }

    .reset {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      background: linear-gradient(180deg, #f2be5d, #c97836);
      color: #fff9e8;
      box-shadow: 0 5px 0 #8d4727;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
    }

    .reset:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #8d4727;
    }

    .notice {
      min-height: 44px;
      margin-bottom: 14px;
      padding: 11px 14px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      color: var(--muted);
      font-weight: 900;
      text-align: center;
    }

    .notice.good {
      color: var(--jade);
      border-color: rgba(63, 143, 116, 0.38);
      background: rgba(224, 248, 232, 0.82);
    }

    .notice.bad {
      color: var(--red);
      border-color: rgba(182, 75, 57, 0.32);
      background: rgba(255, 232, 224, 0.82);
    }

    .game {
      display: grid;
      grid-template-columns: 0.9fr 1.6fr;
      gap: 18px;
      align-items: start;
    }

    .column {
      border: 3px solid rgba(93, 64, 39, 0.2);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(120, 80, 40, 0.04) 1px, transparent 1px) 0 0 / 26px 26px,
        rgba(255, 248, 232, 0.94);
      box-shadow: 0 12px 26px rgba(81, 54, 30, 0.12);
      padding: 14px;
    }

    .column-title {
      margin: 0 0 12px;
      font-size: 1.25rem;
      color: #79472b;
    }

    .dynasty-list,
    .event-grid {
      display: grid;
      gap: 10px;
    }

    .dynasty-button {
      width: 100%;
      min-height: 68px;
      border: 2px solid rgba(105, 67, 37, 0.2);
      border-radius: 8px;
      background: linear-gradient(180deg, #fff5d7, #ecd09a);
      color: #613b24;
      cursor: pointer;
      font: inherit;
      font-size: 1.7rem;
      font-weight: 900;
      box-shadow: 0 5px 0 rgba(112, 73, 38, 0.18);
      transition: transform 130ms ease, background 130ms ease, border-color 130ms ease;
    }

    .dynasty-button:hover,
    .dynasty-button.selected {
      border-color: rgba(182, 75, 57, 0.56);
      background: linear-gradient(180deg, #ffe9a8, #e5a64a);
      transform: translateY(-2px);
    }

    .dynasty-button.done {
      color: #66806f;
      background: #e7ead5;
      box-shadow: none;
    }

    .event-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .event-card {
      position: relative;
      min-height: 112px;
      border: 2px solid rgba(93, 64, 39, 0.18);
      border-radius: 8px;
      padding: 12px 10px;
      background: #fffdf6;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      text-align: center;
      box-shadow: 0 6px 0 rgba(80, 52, 30, 0.11);
      transition: transform 130ms ease, border-color 130ms ease, background 130ms ease, opacity 130ms ease;
    }

    .event-card:hover {
      transform: translateY(-3px);
      border-color: rgba(82, 120, 173, 0.4);
    }

    .event-card.correct {
      cursor: default;
      opacity: 0.62;
      background: #e5f5dd;
      border-color: rgba(63, 143, 116, 0.36);
      box-shadow: none;
    }

    .event-card.wrong {
      animation: shake 260ms ease;
      border-color: rgba(182, 75, 57, 0.5);
      background: #fff0ea;
    }

    .icon {
      display: block;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .event-text {
      display: block;
      font-weight: 900;
      line-height: 1.35;
    }

    .tag {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(63, 143, 116, 0.12);
      color: var(--jade);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .complete {
      display: none;
      margin-top: 16px;
      padding: 18px;
      border-radius: 8px;
      background: #fff0be;
      border: 3px solid rgba(214, 154, 51, 0.38);
      text-align: center;
      font-size: 1.4rem;
      font-weight: 900;
      color: #7a4728;
    }

    .complete.show {
      display: block;
    }

    @keyframes shake {
      25% {
        transform: translateX(-5px);
      }
      75% {
        transform: translateX(5px);
      }
    }

    @media (max-width: 820px) {
      header {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .reset {
        grid-column: 1 / -1;
      }

      .game {
        grid-template-columns: 1fr;
      }

      .event-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .event-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <a class="map-link" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <main>
    <header>
      <div>
        <h1>朝代配對</h1>
        <p class="subtitle">先選左邊朝代，再點右邊對應事件。</p>
      </div>
      <div class="stats" aria-label="練習狀態">
        <div class="stat">分數<span id="score">0</span></div>
        <div class="stat">完成<span><span id="matched">0</span>/<span id="total">0</span></span></div>
        <button class="reset" id="resetButton" type="button">重新開始</button>
      </div>
    </header>

    <div class="notice" id="notice">請先選一個朝代。</div>

    <section class="game">
      <aside class="column">
        <h2 class="column-title">朝代</h2>
        <div class="dynasty-list" id="dynastyList"></div>
      </aside>

      <section class="column">
        <h2 class="column-title">事件</h2>
        <div class="event-grid" id="eventGrid"></div>
        <div class="complete" id="complete">全部完成！可以請學生說明每個事件的歷史背景。</div>
      </section>
    </section>
  </main>

  <script>
    const dynasties = [
      { id: 1, name: "秦" },
      { id: 2, name: "漢" },
      { id: 3, name: "唐" },
      { id: 4, name: "宋" },
      { id: 5, name: "明" },
      { id: 6, name: "清" }
    ];

    const events = [
      { id: "e1", dynasty_id: 1, text: "統一六國", icon: "⚔️" },
      { id: "e2", dynasty_id: 1, text: "修築萬里長城", icon: "🧱" },
      { id: "e3", dynasty_id: 1, text: "焚書坑儒", icon: "🔥" },
      { id: "e4", dynasty_id: 2, text: "張騫通西域", icon: "🐪" },
      { id: "e5", dynasty_id: 2, text: "文景之治", icon: "📜" },
      { id: "e6", dynasty_id: 2, text: "罷黜百家獨尊儒術", icon: "📖" },
      { id: "e7", dynasty_id: 3, text: "貞觀之治", icon: "👑" },
      { id: "e8", dynasty_id: 3, text: "安史之亂", icon: "💥" },
      { id: "e9", dynasty_id: 3, text: "玄奘西行取經", icon: "🧘" },
      { id: "e10", dynasty_id: 4, text: "王安石變法", icon: "📜" },
      { id: "e11", dynasty_id: 4, text: "活字印刷術普及", icon: "🔠" },
      { id: "e12", dynasty_id: 4, text: "岳飛抗金", icon: "🛡️" },
      { id: "e13", dynasty_id: 5, text: "鄭和下西洋", icon: "⛵" },
      { id: "e14", dynasty_id: 5, text: "修成《永樂大典》", icon: "📚" },
      { id: "e15", dynasty_id: 5, text: "戚繼光抗倭", icon: "🏯" },
      { id: "e16", dynasty_id: 6, text: "康乾盛世", icon: "🌾" },
      { id: "e17", dynasty_id: 6, text: "鴉片戰爭", icon: "🚢" },
      { id: "e18", dynasty_id: 6, text: "簽訂《南京條約》", icon: "🖋️" }
    ];

    const dynastyList = document.querySelector("#dynastyList");
    const eventGrid = document.querySelector("#eventGrid");
    const notice = document.querySelector("#notice");
    const scoreEl = document.querySelector("#score");
    const matchedEl = document.querySelector("#matched");
    const totalEl = document.querySelector("#total");
    const resetButton = document.querySelector("#resetButton");
    const complete = document.querySelector("#complete");

    let selectedDynastyId = null;
    let score = 0;
    const matchedEventIds = new Set();

    resetButton.addEventListener("click", resetGame);
    totalEl.textContent = String(events.length);
    render();

    function render() {
      renderDynasties();
      renderEvents();
      updateStats();
    }

    function renderDynasties() {
      dynastyList.innerHTML = "";

      dynasties.forEach((dynasty) => {
        const button = document.createElement("button");
        const remaining = events.filter((event) => event.dynasty_id === dynasty.id && !matchedEventIds.has(event.id)).length;
        button.className = "dynasty-button";
        button.type = "button";
        button.textContent = dynasty.name;

        if (selectedDynastyId === dynasty.id) {
          button.classList.add("selected");
        }

        if (remaining === 0) {
          button.classList.add("done");
        }

        button.addEventListener("click", () => {
          selectedDynastyId = dynasty.id;
          setNotice(`已選擇「${dynasty.name}」，請找出對應事件。`);
          renderDynasties();
        });

        dynastyList.appendChild(button);
      });
    }

    function renderEvents() {
      eventGrid.innerHTML = "";

      shuffle([...events]).forEach((event) => {
        const button = document.createElement("button");
        const dynasty = dynasties.find((item) => item.id === event.dynasty_id);
        const isMatched = matchedEventIds.has(event.id);
        button.className = "event-card";
        button.type = "button";
        button.disabled = isMatched;

        if (isMatched) {
          button.classList.add("correct");
        }

        button.innerHTML = `
          <span class="icon">${event.icon}</span>
          <span class="event-text">${event.text}</span>
          ${isMatched ? `<span class="tag">${dynasty.name}</span>` : ""}
        `;

        button.addEventListener("click", () => checkAnswer(event, button));
        eventGrid.appendChild(button);
      });
    }

    function checkAnswer(event, button) {
      if (!selectedDynastyId) {
        setNotice("先選左邊一個朝代，再點事件。", "bad");
        return;
      }

      const dynasty = dynasties.find((item) => item.id === selectedDynastyId);

      if (event.dynasty_id === selectedDynastyId) {
        score += 10;
        matchedEventIds.add(event.id);
        setNotice(`答對！「${event.text}」屬於「${dynasty.name}」。`, "good");
        render();
      } else {
        score = Math.max(0, score - 3);
        button.classList.remove("wrong");
        void button.offsetWidth;
        button.classList.add("wrong");
        setNotice(`再想想，「${event.text}」不是「${dynasty.name}」的事件。`, "bad");
        updateStats();
      }

      if (matchedEventIds.size === events.length) {
        localStorage.setItem("cert_dynasty", "true");
        complete.classList.add("show");
        setNotice(`全部配對完成！總分 ${score} 分。`, "good");
      }
    }

    function updateStats() {
      scoreEl.textContent = String(score);
      matchedEl.textContent = String(matchedEventIds.size);
    }

    function setNotice(text, type = "") {
      notice.textContent = text;
      notice.className = `notice ${type}`.trim();
    }

    function resetGame() {
      selectedDynastyId = null;
      score = 0;
      matchedEventIds.clear();
      complete.classList.remove("show");
      setNotice("請先選一個朝代。");
      render();
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }
  </script>
</body>
</html>
